<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketMaster</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body.tm-app-booting {
        background: #111417;
      }

      .tm-bootstrap-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111417;
      }

      .tm-bootstrap-spinner {
        width: 36px;
        height: 36px;
        border-radius: 9999px;
        border: 3px solid #27313d;
        border-top-color: #60a5fa;
        animation: tm-bootstrap-spin .8s linear infinite;
      }

      @keyframes tm-bootstrap-spin {
        to {
          transform: rotate(360deg);
        }
      }

      #app-brandimage > a,
      #app-brandimage img,
      #app-sidebar-logo,
      #app-sidepanel img,
      #app-sidepanel [class*="logo"],
      #app-sidepanel [class*="brand"] {
        background-image: none !important;
      }

      #app-brandimage img,
      #app-sidebar-logo {
        display: none !important;
      }

      body.tm-app-booting #app-brandimage,
      body.tm-app-booting #app-sidebar,
      body.tm-app-booting #app-header,
      body.tm-app-booting #app-sidepanel,
      body.tm-route-loading #app-brandimage,
      body.tm-route-loading #app-sidebar,
      body.tm-route-loading #app-header,
      body.tm-route-loading #app-sidepanel {
        display: none !important;
      }
    </style>
  </head>
  <body class="tm-app-booting">
    <div id="tm-global-loader" class="tm-bootstrap-loader" aria-hidden="true">
      <span class="tm-bootstrap-spinner"></span>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
