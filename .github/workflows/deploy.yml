name: Deploy

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public base URL for smoke check (no trailing slash)
        required: true
        default: https://ticketmaster.cermofi.cz
      skip_build:
        description: Skip docker build (restart only)
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make deploy script executable
        run: chmod +x scripts/deploy.sh scripts/post-deploy-smoke.sh
      - name: Deploy note
        run: |
          echo "This workflow documents the deploy contract."
          echo "Run scripts/deploy.sh on the VPS after pushing to main."
          echo "Smoke target: ${{ github.event.inputs.base_url }}"
      - name: Smoke check only (CI validation)
        env:
          SMOKE_CHECK_BASE_URL: ${{ github.event.inputs.base_url }}
        run: bash scripts/post-deploy-smoke.sh
