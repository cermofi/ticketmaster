name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag (e.g. main-latest or sha-<commit>)
        required: true
        default: main-latest
      smoke_base_url:
        description: Public URL for smoke check (no trailing slash)
        required: true
        default: https://ticketmaster.cermofi.cz

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, prod-deploy]
    environment: production
    timeout-minutes: 45

    steps:
      - name: Ensure app directory exists
        run: test -d /opt/ticketmaster

      - name: Sync production checkout
        run: |
          set -euo pipefail
          cd /opt/ticketmaster
          git fetch --prune origin
          git checkout main
          git pull --ff-only origin main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write deploy image tag env
        run: |
          set -euo pipefail
          cd /opt/ticketmaster
          echo "IMAGE_TAG=${{ inputs.image_tag }}" > .env.images

      - name: Validate image tags exist in GHCR
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          TAG="${{ inputs.image_tag }}"
          docker manifest inspect "ghcr.io/${OWNER}/ticketmaster-api:${TAG}" >/dev/null
          docker manifest inspect "ghcr.io/${OWNER}/ticketmaster-docs:${TAG}" >/dev/null
          docker manifest inspect "ghcr.io/${OWNER}/ticketmaster-frontend:${TAG}" >/dev/null

      - name: Pull images, run migration, restart services
        run: |
          set -euo pipefail
          cd /opt/ticketmaster
          COMPOSE=(docker compose --env-file .env --env-file .env.images -f docker-compose.yml)

          "${COMPOSE[@]}" pull api docs frontend
          "${COMPOSE[@]}" run --rm -T api ticketmaster-cli db migrate
          "${COMPOSE[@]}" up -d --no-build api docs frontend
          "${COMPOSE[@]}" ps

      - name: Post-deploy smoke gate
        run: |
          set -euo pipefail
          cd /opt/ticketmaster
          SMOKE_CHECK_BASE_URL="${{ inputs.smoke_base_url }}" bash scripts/post-deploy-smoke.sh
