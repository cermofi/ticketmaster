name: Post-deploy smoke check

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public base URL (no trailing slash)
        required: true
        default: https://ticketmaster.cermofi.cz
  workflow_call:
    inputs:
      base_url:
        description: Public base URL (no trailing slash)
        required: false
        type: string
        default: https://ticketmaster.cermofi.cz
    secrets:
      SMOKE_CHECK_EMAIL:
        required: false
      SMOKE_CHECK_PASSWORD:
        required: false

permissions:
  contents: read

concurrency:
  group: post-deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (smoke CLI)
        working-directory: backend
        run: pip install -e .
      - name: Read-only production smoke check
        env:
          SMOKE_CHECK_BASE_URL: ${{ inputs.base_url || github.event.inputs.base_url || 'https://ticketmaster.cermofi.cz' }}
        run: bash scripts/post-deploy-smoke.sh
      - name: Optional authenticated read-only checks
        env:
          SMOKE_CHECK_BASE_URL: ${{ inputs.base_url || github.event.inputs.base_url || 'https://ticketmaster.cermofi.cz' }}
          SMOKE_ALLOW_AUTH: "1"
          SMOKE_CHECK_EMAIL: ${{ secrets.SMOKE_CHECK_EMAIL }}
          SMOKE_CHECK_PASSWORD: ${{ secrets.SMOKE_CHECK_PASSWORD }}
        run: |
          if [ -z "${SMOKE_CHECK_EMAIL}" ] || [ -z "${SMOKE_CHECK_PASSWORD}" ]; then
            echo "Skipping authenticated smoke checks (SMOKE_CHECK_EMAIL/PASSWORD not set)."
            exit 0
          fi
          bash scripts/post-deploy-smoke.sh
