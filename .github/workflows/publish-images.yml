name: Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: ticketmaster-api
            context: backend
            dockerfile: backend/Dockerfile
          - image_name: ticketmaster-docs
            context: docs-site
            dockerfile: docs-site/Dockerfile
          - image_name: ticketmaster-frontend
            context: .
            dockerfile: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - id: owner
        name: Lowercase owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}:sha-${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}:main-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
