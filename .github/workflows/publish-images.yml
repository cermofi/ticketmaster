name: Publish Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-main
  cancel-in-progress: false

jobs:
  publish:
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: ticketmaster-api
            context: backend
            dockerfile: backend/Dockerfile
          - image_name: ticketmaster-docs
            context: docs-site
            dockerfile: docs-site/Dockerfile
          - image_name: ticketmaster-frontend
            context: .
            dockerfile: frontend/Dockerfile

    steps:
      - id: source
        name: Resolve source commit
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.sha }}

      - id: owner
        name: Lowercase owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: |
            APP_VERSION=sha-${{ steps.source.outputs.sha }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}:sha-${{ steps.source.outputs.sha }}
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}:main-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
