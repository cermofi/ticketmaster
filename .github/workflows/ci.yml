name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.force_all.outputs.backend || steps.filter.outputs.backend || 'false' }}
      frontend: ${{ steps.force_all.outputs.frontend || steps.filter.outputs.frontend || 'false' }}
      docs: ${{ steps.force_all.outputs.docs || steps.filter.outputs.docs || 'false' }}
      workflows: ${{ steps.force_all.outputs.workflows || steps.filter.outputs.workflows || 'false' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: force_all
        if: github.event_name == 'merge_group'
        run: |
          {
            echo "backend=true"
            echo "frontend=true"
            echo "docs=true"
            echo "workflows=true"
          } >> "$GITHUB_OUTPUT"
      - id: filter
        if: github.event_name != 'merge_group'
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
            docs:
              - 'docs-site/**'
              - '.github/workflows/**'
            workflows:
              - '.github/workflows/**'

  workflow-lint:
    needs: [changes]
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Lint workflow files
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          level: error
          fail_level: error
          filter_mode: nofilter

  backend-tests:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Restore uv cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install backend
        working-directory: backend
        run: uv sync --frozen --extra test
      - name: Run backend tests in parallel
        working-directory: backend
        run: uv run --frozen --extra test pytest -n auto --junitxml=pytest-report.xml
      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-pytest-report
          path: backend/pytest-report.xml
          if-no-files-found: warn
          retention-days: 14

  frontend-tests:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit
      - name: Run frontend tests
        working-directory: frontend
        run: |
          set -o pipefail
          npm test 2>&1 | tee frontend-test.log
      - name: Upload frontend test log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-test-log
          path: frontend/frontend-test.log
          if-no-files-found: warn
          retention-days: 14

  docker-build-check:
    name: docker-build-check (${{ matrix.image_name }}, ${{ matrix.required_context }}, ${{ matrix.dockerfile }})
    needs: [changes, workflow-lint, backend-tests, frontend-tests]
    if: >-
      ${{
        (needs['workflow-lint'].result == 'success' || needs['workflow-lint'].result == 'skipped') &&
        (needs['backend-tests'].result == 'success' || needs['backend-tests'].result == 'skipped') &&
        (needs['frontend-tests'].result == 'success' || needs['frontend-tests'].result == 'skipped')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: api
            required_context: backend
            cache_scope: ticketmaster-api
            context: backend
            dockerfile: backend/Dockerfile
            path_key: backend
          - image_name: docs
            required_context: docs-site
            cache_scope: ticketmaster-docs
            context: docs-site
            dockerfile: docs-site/Dockerfile
            path_key: docs
          - image_name: frontend
            required_context: .
            cache_scope: ticketmaster-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            path_key: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: build_gate
        name: Resolve image build gate
        env:
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
        run: |
          changed="false"
          case "${{ matrix.path_key }}" in
            backend)
              changed="${BACKEND_CHANGED}"
              ;;
            frontend)
              changed="${FRONTEND_CHANGED}"
              ;;
            docs)
              changed="${DOCS_CHANGED}"
              ;;
          esac
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
      - name: Skip unchanged image build
        if: steps.build_gate.outputs.changed != 'true'
        run: echo "Skipping ${{ matrix.image_name }} image build (no relevant changes)."
      - if: steps.build_gate.outputs.changed == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Docker build check (${{ matrix.image_name }})
        if: steps.build_gate.outputs.changed == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=min,scope=${{ matrix.cache_scope }}
