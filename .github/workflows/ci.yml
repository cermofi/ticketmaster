name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
            docs:
              - 'docs-site/**'
              - '.github/workflows/**'

  backend-tests:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Install backend
        working-directory: backend
        run: |
          uv venv .venv --python 3.12
          uv pip install --python .venv/bin/python -e ".[test]" pytest-xdist
      - name: Run backend tests in parallel
        working-directory: backend
        run: .venv/bin/python -m pytest -n auto

  frontend-tests:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit
      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  docker-build-check:
    needs: [changes, backend-tests, frontend-tests]
    if: >-
      ${{
        always() && (
          (matrix.image_name == 'api' && needs.changes.outputs.backend == 'true' &&
           (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped')) ||
          (matrix.image_name == 'docs' && needs.changes.outputs.docs == 'true') ||
          (matrix.image_name == 'frontend' && needs.changes.outputs.frontend == 'true' &&
           (needs.frontend-tests.result == 'success' || needs.frontend-tests.result == 'skipped'))
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: api
            cache_scope: ticketmaster-api
            context: backend
            dockerfile: backend/Dockerfile
          - image_name: docs
            cache_scope: ticketmaster-docs
            context: docs-site
            dockerfile: docs-site/Dockerfile
          - image_name: frontend
            cache_scope: ticketmaster-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Docker build check (${{ matrix.image_name }})
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=min,scope=${{ matrix.cache_scope }}
