name: Post-deploy smoke check

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public base URL (no trailing slash)
        required: true
        default: https://ticketmaster.cermofi.cz

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (smoke CLI)
        working-directory: backend
        run: pip install -e .
      - name: Read-only production smoke check
        env:
          SMOKE_CHECK_BASE_URL: ${{ github.event.inputs.base_url || 'https://ticketmaster.cermofi.cz' }}
        run: bash scripts/post-deploy-smoke.sh
      - name: Optional authenticated read-only checks
        if: ${{ secrets.SMOKE_CHECK_EMAIL != '' && secrets.SMOKE_CHECK_PASSWORD != '' }}
        env:
          SMOKE_CHECK_BASE_URL: ${{ github.event.inputs.base_url || 'https://ticketmaster.cermofi.cz' }}
          SMOKE_ALLOW_AUTH: "1"
          SMOKE_CHECK_EMAIL: ${{ secrets.SMOKE_CHECK_EMAIL }}
          SMOKE_CHECK_PASSWORD: ${{ secrets.SMOKE_CHECK_PASSWORD }}
        run: bash scripts/post-deploy-smoke.sh
