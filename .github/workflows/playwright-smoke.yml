name: Playwright smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Staging app base URL (no trailing slash)
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: playwright-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend + Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Run smoke specs against staging
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || secrets.E2E_STAGING_BASE_URL || 'https://staging.ticketmaster.cermofi.cz' }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_STAGING_ADMIN_EMAIL || secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_STAGING_ADMIN_PASSWORD || secrets.E2E_ADMIN_PASSWORD }}
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7
